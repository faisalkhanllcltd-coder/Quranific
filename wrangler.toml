name = "quranific"
pages_build_output_dir = "dist"
compatibility_date = "2026-03-25"
compatibility_flags = ["nodejs_compat"]

# Mandate 1 & 8: Dynamic global edge execution routing
[placement]
mode = "smart"

[vars]
ENVIRONMENT = "production"

# C-1 FIX: Uncommented the SESSION KV binding so the API routes can perform
# idempotency checks and store dead-letter leads when Resend fails.
[[kv_namespaces]]
binding = "SESSION"
id = "14eab319d57e4c58b5f903bce3eb3931"